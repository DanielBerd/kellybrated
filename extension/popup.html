<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { width: 430px; }
  #bar {
    display: flex; align-items: center; justify-content: flex-end;
    padding: 1px 6px; border-bottom: 1px solid #ccc;
  }
  #open-tab {
    border: none; background: none; cursor: pointer;
    font: 13px Georgia, serif; color: #17395c; padding: 3px 6px;
  }
  #open-tab:hover { text-decoration: underline; }
  #frame { display: block; width: 430px; height: 570px; border: none; background: #fff; }
</style>
</head>
<body>
<div id="bar"><button id="open-tab" title="Open the calculator in a full tab">Open in tab ⧉</button></div>
<iframe id="frame" title="Kelly calculator"></iframe>
<script src="calc-url.js"></script>
<script src="popup.js"></script>
</body>
</html>
